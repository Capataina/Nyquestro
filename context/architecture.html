<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyquestro · Architecture Explorer</title>
<style>
/* ============================================================
   NeuroDrive Architecture Explorer — instrument-panel theme
   ============================================================ */

:root {
  /* surfaces */
  --bg-base: #090a0e;
  --bg-panel: #0d0f15;
  --bg-rail: #0b0d12;
  --bg-elevated: #14161f;
  --bg-elevated-2: #1a1d28;
  --bg-canvas: #07080b;
  --bg-hover: rgba(255,255,255,0.04);
  --bg-active: rgba(79,214,192,0.10);

  /* lines */
  --line: rgba(255,255,255,0.07);
  --line-med: rgba(255,255,255,0.12);
  --line-strong: rgba(255,255,255,0.20);

  /* text */
  --tx: #e7eaf2;
  --tx-2: #a6adbf;
  --tx-3: #6b7488;
  --tx-4: #454c5c;

  /* accents */
  --cyan: #4fd6c0;
  --cyan-dim: rgba(79,214,192,0.16);
  --teal: #45b9da;
  --violet: #9d8df7;
  --violet-dim: rgba(157,141,247,0.16);
  --amber: #f0b65e;
  --amber-dim: rgba(240,182,94,0.16);
  --sage: #62bf95;
  --slate: #8190b5;
  --red: #ef6b72;
  --red-dim: rgba(239,107,114,0.16);
  --neutral: #cdd3e2;

  /* kind → colour mapping (subsystem roles) */
  --k-entry: var(--neutral);
  --k-foundation: var(--slate);
  --k-env: var(--cyan);
  --k-boundary: var(--teal);
  --k-learner: var(--violet);
  --k-observer: var(--amber);

  /* type */
  --ui: "Space Grotesk", system-ui, sans-serif;
  --mono: "JetBrains Mono", "SF Mono", ui-monospace, monospace;

  /* metrics */
  --topbar-h: 50px;
  --bottom-h: 64px;
  --left-w: 286px;
  --right-w: 340px;
  --r: 7px;
  --r-sm: 5px;
  --ease: cubic-bezier(.22,.61,.36,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-base);
  color: var(--tx);
  font-family: var(--ui);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}

::-webkit-scrollbar { width: 9px; height: 9px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); background-clip: padding-box; }

code, .mono { font-family: var(--mono); }
button { font-family: inherit; color: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }

/* ============================================================
   APP SHELL
   ============================================================ */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background:
    radial-gradient(1200px 700px at 60% -10%, rgba(79,214,192,0.05), transparent 60%),
    var(--bg-base);
}
.topbar { flex: 0 0 var(--topbar-h); }
.workbench { flex: 1 1 auto; min-height: 0; }
.bottom { flex: 0 0 auto; }

.workbench {
  display: grid;
  grid-template-columns: var(--left-w) minmax(0,1fr) var(--right-w);
  min-height: 0;
  transition: grid-template-columns .32s cubic-bezier(.34,1.4,.5,1);
}
.workbench.left-collapsed  { grid-template-columns: 0 minmax(0,1fr) var(--right-w); }
.workbench.right-collapsed { grid-template-columns: var(--left-w) minmax(0,1fr) 0; }
.workbench.left-collapsed.right-collapsed { grid-template-columns: 0 minmax(0,1fr) 0; }
.left-rail, .right-rail { transition: border-color .2s; }

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 0 16px;
  background: linear-gradient(180deg, #0f1119, #0b0d12);
  border-bottom: 1px solid var(--line);
  z-index: 30;
}
.tb-panel-toggle {
  width: 30px; height: 30px; flex: none;
  display: grid; place-items: center;
  border: 1px solid var(--line); border-radius: var(--r-sm);
  color: var(--tx-3); transition: .15s;
}
.tb-panel-toggle:hover { color: var(--tx); border-color: var(--line-strong); background: var(--bg-hover); }
.tb-panel-toggle.on { color: var(--cyan); border-color: var(--cyan-dim); }

.tb-brand { display: flex; align-items: center; gap: 9px; }
.tb-logo {
  width: 24px; height: 24px; border-radius: 6px;
  background: conic-gradient(from 210deg, var(--cyan), var(--violet), var(--amber), var(--cyan));
  position: relative;
}
.tb-logo::after {
  content: ""; position: absolute; inset: 3px; border-radius: 4px; background: #0b0d12;
}
.tb-logo::before {
  content: ""; position: absolute; inset: 8px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 8px var(--cyan); z-index: 1;
}
.tb-crumb { display: flex; align-items: center; gap: 8px; font-size: 13px; min-width: 0; }
.tb-crumb .dim { color: var(--tx-3); }
.tb-crumb .sep { color: var(--tx-4); }
.tb-crumb .proj { font-weight: 600; letter-spacing: .01em; }
.tb-crumb .file { font-family: var(--mono); font-size: 12px; color: var(--tx-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.tb-status {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; color: var(--sage);
  padding: 3px 9px; border-radius: 20px;
  background: rgba(98,191,149,0.10); border: 1px solid rgba(98,191,149,0.22);
}
.tb-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sage); box-shadow: 0 0 6px var(--sage); }

.tb-spacer { flex: 1; }

.tb-search {
  display: flex; align-items: center; gap: 7px;
  background: var(--bg-base); border: 1px solid var(--line);
  border-radius: 20px; padding: 6px 13px; width: 230px;
  transition: .18s;
}
.tb-search:focus-within { border-color: var(--cyan-dim); width: 280px; box-shadow: 0 0 0 3px var(--cyan-dim); }
.tb-search svg { width: 13px; height: 13px; color: var(--tx-3); flex: none; }
.tb-search input { flex: 1; background: none; border: none; outline: none; color: var(--tx); font-size: 12.5px; min-width: 0; }
.tb-search input::placeholder { color: var(--tx-4); }
.tb-search kbd { font-family: var(--mono); font-size: 10px; color: var(--tx-4); border: 1px solid var(--line); border-radius: 3px; padding: 1px 5px; }

.tb-meta { font-family: var(--mono); font-size: 11px; color: var(--tx-3); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.tb-meta b { color: var(--cyan); font-weight: 500; }

/* ============================================================
   LEFT EXPLORER
   ============================================================ */
.left-rail {
  background: var(--bg-rail);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  min-height: 0; overflow: hidden;
}
.workbench.left-collapsed .left-rail { border-right: none; }

.lr-head {
  padding: 12px 14px 9px;
  display: flex; align-items: center; justify-content: space-between;
}
.lr-title { font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; color: var(--tx-3); font-weight: 600; }
.lr-count { font-family: var(--mono); font-size: 10px; color: var(--tx-4); }

.lr-scroll { flex: 1; overflow-y: auto; padding: 0 8px 16px; }

.lr-group { margin-bottom: 3px; }
.lr-group-head {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 8px; border-radius: var(--r-sm);
  font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--tx-3); font-weight: 600; user-select: none;
  transition: .12s;
}
.lr-group-head:hover { background: var(--bg-hover); color: var(--tx-2); }
.lr-group-head .chev { font-size: 9px; color: var(--tx-4); transition: transform .2s var(--ease); width: 9px; }
.lr-group.collapsed .chev { transform: rotate(-90deg); }
.lr-group-head .gcount { margin-left: auto; font-family: var(--mono); font-size: 9.5px; color: var(--tx-4); letter-spacing: 0; }
.lr-group-items { overflow: hidden; transition: max-height .26s var(--ease); }
.lr-group.collapsed .lr-group-items { max-height: 0 !important; }

.lr-item {
  display: flex; align-items: center; gap: 9px;
  padding: 6px 9px 6px 22px; border-radius: var(--r-sm);
  color: var(--tx-2); font-size: 12.5px; cursor: pointer;
  position: relative; transition: .12s; user-select: none;
}
.lr-item:hover { background: var(--bg-hover); color: var(--tx); }
.lr-item.active { background: var(--bg-active); color: var(--tx); }
.lr-item.active::before {
  content: ""; position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 15px; border-radius: 2px; background: var(--cyan);
}
.lr-item .swatch { width: 8px; height: 8px; border-radius: 2px; flex: none; }
.lr-item .ico { width: 13px; flex: none; color: var(--tx-3); font-size: 11px; text-align: center; }
.lr-item .lbl { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lr-item .meta { font-family: var(--mono); font-size: 9.5px; color: var(--tx-4); }
.lr-item.node-item .lbl { font-family: var(--mono); font-size: 12px; }
.lr-item.hidden-by-search { display: none; }

/* ============================================================
   CENTER WORKSPACE
   ============================================================ */
.center {
  display: flex; flex-direction: column;
  min-width: 0; min-height: 0;
  background: var(--bg-panel);
}

.ws-tabs {
  display: flex; align-items: stretch; gap: 2px;
  padding: 0 12px; height: 44px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, #0c0e14, #0b0d12);
  overflow-x: auto; flex: none;
}
.ws-tab {
  display: flex; align-items: center; gap: 7px;
  padding: 0 14px; font-size: 12.5px; color: var(--tx-3);
  position: relative; white-space: nowrap; transition: .14s;
}
.ws-tab .ti { font-size: 12px; opacity: .8; }
.ws-tab:hover { color: var(--tx-2); }
.ws-tab.active { color: var(--tx); }
.ws-tab.active::after {
  content: ""; position: absolute; left: 10px; right: 10px; bottom: 0; height: 2px;
  background: var(--cyan); border-radius: 2px 2px 0 0; box-shadow: 0 0 10px var(--cyan-dim);
}
.ws-tab .badge { font-family: var(--mono); font-size: 9.5px; color: var(--tx-4); background: var(--bg-base); border: 1px solid var(--line); border-radius: 10px; padding: 0 6px; }

.ws-body { flex: 1; min-height: 0; position: relative; }
.ws-view { position: absolute; inset: 0; display: none; overflow: auto; }
.ws-view.active { display: block; }
.ws-view.graph-view { overflow: hidden; }

/* ---- workspace toolbar (graph) ---- */
.ws-toolbar {
  position: absolute; top: 12px; left: 12px; right: 12px; z-index: 12;
  display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; row-gap: 8px; pointer-events: none;
}
.ws-toolbar > * { pointer-events: auto; }
.tool-group {
  display: flex; align-items: center; gap: 1px;
  background: rgba(13,15,21,0.86); backdrop-filter: blur(8px);
  border: 1px solid var(--line-med); border-radius: var(--r); padding: 3px;
}
.tool-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-radius: var(--r-sm);
  font-size: 11.5px; color: var(--tx-2); transition: .12s;
}
.tool-btn:hover { background: var(--bg-hover); color: var(--tx); }
.tool-btn.active { background: var(--cyan-dim); color: var(--cyan); }
.tool-btn .ti { font-size: 12px; }
.tool-sep { width: 1px; height: 18px; background: var(--line-med); margin: 0 3px; }
.zoom-val { font-family: var(--mono); font-size: 11px; color: var(--tx-2); min-width: 42px; text-align: center; }

.ws-hint {
  margin-left: auto;
  font-family: var(--mono); font-size: 10.5px; color: var(--tx-4);
  background: rgba(13,15,21,0.7); border: 1px solid var(--line); border-radius: var(--r);
  padding: 6px 10px;
}

/* ============================================================
   GRAPH CANVAS
   ============================================================ */
.graph-stage {
  position: absolute; inset: 0;
  background-color: var(--bg-canvas);
  background-image:
    radial-gradient(circle at center, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 26px 26px;
  cursor: grab;
  overflow: hidden;
}
.graph-stage.panning { cursor: grabbing; }
.graph-stage svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#graphRoot { transition: none; }

.edge {
  fill: none;
  stroke: var(--line-strong);
  stroke-width: 1.5;
  transition: stroke .25s, opacity .25s, stroke-width .25s;
}
.edge.rel-strong { stroke: rgba(79,214,192,0.55); stroke-width: 2; }
.edge.rel-write { stroke: rgba(157,141,247,0.5); stroke-dasharray: 4 4; }
.edge.rel-peer { stroke: rgba(240,182,94,0.5); stroke-dasharray: 2 4; }
.edge.dim { opacity: 0.12; }
.edge.hot { stroke: var(--cyan); stroke-width: 2.6; opacity: 1; filter: drop-shadow(0 0 4px var(--cyan-dim)); }
.edge.hot.rel-write { stroke: var(--violet); }
.edge.hot.rel-peer { stroke: var(--amber); }

.edge-flow {
  fill: none; stroke-width: 2.4; stroke-linecap: round;
  stroke-dasharray: 5 200; opacity: 0;
}
.edge-flow.run { opacity: 1; animation: flowdash 1.1s linear infinite; }
@keyframes flowdash { to { stroke-dashoffset: -205; } }

.node { cursor: pointer; transition: opacity .25s; }
.node .node-box {
  transition: stroke .2s, fill .2s, filter .2s;
}
.node .node-label { font-family: var(--mono); font-weight: 500; pointer-events: none; }
.node .node-sub { font-family: var(--ui); pointer-events: none; }
.node .node-dot { transition: r .2s; }
.node.dim { opacity: 0.18; }
.node:hover .node-box { filter: brightness(1.25); }
.node.selected .node-box { stroke-width: 2.2; }

/* glow layer (selection / flow / impact / external highlight) */
.node-glow { opacity: 0; filter: blur(4px); pointer-events: none; }
.node.selected .node-glow { opacity: .55; }
.node.ext-hot .node-glow { opacity: .85; }
.node.ext-hot { opacity: 1 !important; }
.node[style*="--impact"] .node-glow { opacity: var(--impact); }
.node.flow-on { opacity: 1 !important; }
.node.flow-on .node-glow { opacity: 1; filter: blur(6px); }
.node.flow-on .node-box { stroke-width: 2.4; filter: brightness(1.35); }
.node.flow-on .node-dot { r: 6; }

/* group collapse / expand control */
.node-ctrl { cursor: pointer; }
.node-ctrl:hover circle { fill: #161a24; }
.node-ctrl text { pointer-events: none; }

/* selected edge */
.edge.sel { stroke-width: 3; filter: drop-shadow(0 0 5px var(--cyan-dim)); opacity: 1; }
.edge-flow.flow-edge { stroke-dasharray: 6 140; }

.node-pulse { opacity: 0; }
.node.selected .node-pulse { opacity: 1; animation: nodepulse 2.2s ease-out infinite; }
@keyframes nodepulse {
  0% { transform: scale(1); opacity: .5; }
  100% { transform: scale(1.9); opacity: 0; }
}

/* graph legend */
.graph-legend {
  position: absolute; bottom: 14px; left: 14px; z-index: 11;
  background: rgba(13,15,21,0.88); backdrop-filter: blur(8px);
  border: 1px solid var(--line-med); border-radius: var(--r);
  padding: 11px 13px; max-width: 250px;
  transition: .25s var(--ease);
}
.graph-legend.collapsed { transform: translateY(calc(100% - 36px)); }
.gl-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; cursor: pointer; }
.gl-title { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--tx-3); font-weight: 600; }
.gl-toggle { font-size: 10px; color: var(--tx-4); }
.gl-body { margin-top: 10px; display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
.gl-col-title { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--tx-4); margin-bottom: 5px; }
.gl-row { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--tx-2); margin-bottom: 4px; }
.gl-row .sw { width: 10px; height: 10px; border-radius: 3px; flex: none; }
.gl-row .ln { width: 16px; height: 0; flex: none; }

/* mini-map */
.graph-minimap {
  position: absolute; bottom: 14px; right: 14px; z-index: 11;
  width: 170px; height: 110px;
  background: rgba(7,8,11,0.9); border: 1px solid var(--line-med);
  border-radius: var(--r); overflow: hidden;
}
.graph-minimap svg { width: 100%; height: 100%; }
.mm-view { fill: rgba(79,214,192,0.10); stroke: var(--cyan); stroke-width: 1; }

/* ============================================================
   RIGHT RAIL
   ============================================================ */
.right-rail {
  background: var(--bg-rail);
  border-left: 1px solid var(--line);
  display: flex; flex-direction: column;
  min-height: 0; overflow: hidden;
}
.workbench.right-collapsed .right-rail { border-left: none; }
.rr-scroll { flex: 1; overflow-y: auto; }

.rr-section { border-bottom: 1px solid var(--line); padding: 13px 15px; }
.rr-shead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.rr-stitle { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--tx-3); font-weight: 600; }
.rr-scount { font-family: var(--mono); font-size: 10px; color: var(--tx-4); }

/* project vitals */
.vital-row { display: flex; align-items: baseline; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed var(--line); }
.vital-row:last-child { border-bottom: none; }
.vital-k { font-size: 12px; color: var(--tx-3); }
.vital-v { font-family: var(--mono); font-size: 12.5px; color: var(--tx); }
.vital-v.cyan { color: var(--cyan); }
.vital-v.sage { color: var(--sage); }
.vital-v.amber { color: var(--amber); }

.rr-tagline { font-size: 12px; line-height: 1.6; color: var(--tx-2); }
.rr-tagline strong { color: var(--tx); font-weight: 600; }

/* node dossier */
.dossier-id { display: flex; align-items: center; gap: 11px; margin-bottom: 4px; }
.dossier-glyph {
  width: 38px; height: 38px; border-radius: 9px; flex: none;
  display: grid; place-items: center; font-family: var(--mono); font-weight: 600; font-size: 15px;
  background: var(--bg-elevated); border: 1.5px solid var(--line-med);
}
.dossier-name { font-family: var(--mono); font-size: 17px; font-weight: 600; color: var(--tx); }
.dossier-root { font-family: var(--mono); font-size: 11px; color: var(--tx-3); }
.dossier-kind { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; margin-top: 8px; }
.dossier-kind .sw { width: 7px; height: 7px; border-radius: 50%; }

.dossier-blurb { font-size: 12px; line-height: 1.6; color: var(--tx-2); margin-top: 11px; }
.dossier-owns { font-size: 11.5px; line-height: 1.6; color: var(--tx-2); }

.chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.dep-chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px; color: var(--tx-2);
  padding: 4px 9px; border-radius: 20px;
  background: var(--bg-elevated); border: 1px solid var(--line-med); cursor: pointer; transition: .13s;
}
.dep-chip:hover { border-color: var(--cyan-dim); color: var(--tx); transform: translateY(-1px); }
.dep-chip .ar { color: var(--tx-4); }
.dep-chip .sw { width: 7px; height: 7px; border-radius: 2px; }

.file-line { display: flex; gap: 8px; font-size: 11px; padding: 4px 0; border-bottom: 1px dashed var(--line); }
.file-line:last-child { border-bottom: none; }
.file-line .fn { font-family: var(--mono); color: var(--tx); white-space: nowrap; }
.file-line .fa { color: var(--tx-3); line-height: 1.45; }

/* risk items */
.risk-item { padding: 9px 0; border-bottom: 1px solid var(--line); }
.risk-item:last-child { border-bottom: none; }
.risk-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.risk-sev { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .08em; padding: 2px 6px; border-radius: 3px; }
.risk-sev.high { color: var(--red); background: var(--red-dim); }
.risk-sev.med { color: var(--amber); background: var(--amber-dim); }
.risk-sev.low { color: var(--tx-3); background: var(--bg-elevated); }
.risk-title { font-size: 12px; font-weight: 500; color: var(--tx); flex: 1; }
.risk-node { font-family: var(--mono); font-size: 9.5px; color: var(--tx-4); cursor: pointer; }
.risk-node:hover { color: var(--cyan); }
.risk-trigger { font-size: 11px; line-height: 1.55; color: var(--tx-3); }

/* glossary */
.gloss-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.gloss-term {
  font-family: var(--mono); font-size: 11px; color: var(--cyan);
  padding: 3px 9px; border-radius: 20px; cursor: help;
  background: var(--cyan-dim); border: 1px solid transparent; transition: .12s; position: relative;
}
.gloss-term:hover { border-color: var(--cyan); }
.gloss-term .def {
  position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(4px);
  width: 240px; background: var(--bg-elevated-2); border: 1px solid var(--line-med);
  border-radius: var(--r); padding: 9px 11px; font-family: var(--ui); font-size: 11px;
  line-height: 1.5; color: var(--tx-2); opacity: 0; pointer-events: none; transition: .15s; z-index: 40;
  box-shadow: 0 14px 34px rgba(0,0,0,.5);
}
.gloss-term:hover .def { opacity: 1; transform: translateX(-50%) translateY(0); }

/* decisions */
.decision { display: flex; gap: 9px; padding: 9px 0; border-bottom: 1px solid var(--line); cursor: pointer; transition: .12s; }
.decision:last-child { border-bottom: none; }
.decision:hover { background: var(--bg-hover); }
.decision .dm { color: var(--cyan); font-size: 9px; margin-top: 3px; }
.decision-title { font-size: 12px; font-weight: 500; color: var(--tx); margin-bottom: 3px; }
.decision-why { font-size: 11px; line-height: 1.55; color: var(--tx-3); }

/* alerts / change frontier */
.alert { display: flex; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--line); }
.alert:last-child { border-bottom: none; }
.alert-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; flex: none; }
.alert-dot.high { background: var(--red); box-shadow: 0 0 7px var(--red); }
.alert-dot.med { background: var(--amber); }
.alert-dot.low { background: var(--tx-3); }
.alert-text { font-size: 12px; color: var(--tx-2); }
.alert-meta { font-family: var(--mono); font-size: 10px; color: var(--tx-4); margin-top: 2px; }

.cf-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; cursor: pointer; }
.cf-item:hover .cf-name { color: var(--cyan); }
.cf-name { font-family: var(--mono); font-size: 11px; color: var(--tx-2); width: 102px; flex: none; transition: .12s; }
.cf-bars { display: flex; align-items: flex-end; gap: 2px; height: 22px; flex: 1; }
.cf-bar { flex: 1; background: linear-gradient(180deg, var(--cyan), rgba(79,214,192,0.25)); border-radius: 1px; min-height: 1px; }

/* ============================================================
   RAIL COLLAPSE TOGGLES (floating chevrons)
   ============================================================ */
.rail-edge-toggle {
  position: absolute; top: 50%; transform: translateY(-50%); z-index: 25;
  width: 18px; height: 46px; display: grid; place-items: center;
  background: var(--bg-elevated); border: 1px solid var(--line-med);
  color: var(--tx-3); transition: .15s;
}
.rail-edge-toggle:hover { color: var(--cyan); background: var(--bg-elevated-2); }
.rail-edge-toggle.left { left: 0; border-left: none; border-radius: 0 8px 8px 0; }
.rail-edge-toggle.right { right: 0; border-right: none; border-radius: 8px 0 0 8px; }

/* ============================================================
   BOTTOM STRIP (KPIs)
   ============================================================ */
.bottom {
  display: flex; flex-direction: column;
  background: linear-gradient(180deg, #0b0d12, #090a0e);
  border-top: 1px solid var(--line);
  max-height: 240px; overflow: hidden;
  transition: max-height .32s cubic-bezier(.34,1.4,.5,1), border-top-color .2s;
}
.app.bottom-collapsed .bottom { max-height: 0; border-top-color: transparent; }

.bottom-kpis {
  display: flex; align-items: stretch;
  border-bottom: 1px solid var(--line);
}
.kpi {
  flex: 1 1 0; padding: 11px 14px; min-width: 0;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center; gap: 3px;
  border-right: 1px solid var(--line); position: relative;
}
.kpi:last-child { border-right: none; }
.kpi-label { font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--tx-4); }
.kpi-vrow { display: flex; align-items: baseline; justify-content: center; gap: 5px; max-width: 100%; }
.kpi-val { font-family: var(--mono); font-size: 19px; font-weight: 600; color: var(--tx); line-height: 1; white-space: nowrap; }
.kpi-unit { font-family: var(--mono); font-size: 10px; color: var(--tx-3); white-space: nowrap; }
.kpi-foot { width: 100%; min-width: 0; display: flex; justify-content: center; align-items: center; min-height: 14px; }
.kpi-delta { font-family: var(--mono); font-size: 9.5px; color: var(--tx-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.kpi.amber .kpi-val { color: var(--amber); }
.kpi.violet .kpi-val { color: var(--violet); }
.kpi.sage .kpi-val { color: var(--sage); }
.kpi-spark { display: flex; align-items: flex-end; justify-content: center; gap: 1.5px; height: 16px; margin-top: 2px; }
.kpi-spark-bar { width: 4px; background: var(--amber); opacity: .65; border-radius: 1px; }

.bottom-status {
  display: flex; justify-content: center; align-items: center;
  gap: 18px; padding: 7px 22px;
  background: rgba(255,255,255,0.015);
}
.bs-item { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10.5px; color: var(--tx-3); white-space: nowrap; }
.bs-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sage); box-shadow: 0 0 6px var(--sage); }

/* ============================================================
   GENERIC DOC TABS (content panes)
   ============================================================ */
.doc { max-width: 1080px; margin: 0 auto; padding: 28px 34px 60px; }
.doc-head { margin-bottom: 22px; }
.doc-title { font-size: 22px; font-weight: 600; letter-spacing: -.01em; }
.doc-sub { font-size: 13px; color: var(--tx-3); margin-top: 5px; line-height: 1.5; }
.doc-intro { font-size: 13px; line-height: 1.7; color: var(--tx-2); margin-bottom: 22px; max-width: 760px; }
.doc-intro code { font-family: var(--mono); font-size: 12px; color: var(--cyan); }

.card {
  background: var(--bg-panel); border: 1px solid var(--line); border-radius: var(--r);
  padding: 16px 18px;
}
.section-eyebrow { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--tx-4); font-weight: 600; margin-bottom: 12px; }

/* data flow swimlanes */
.flow-legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; font-family: var(--mono); font-size: 11px; color: var(--tx-3); }
.flow-legend .chip { display: flex; align-items: center; gap: 6px; }
.flow-legend .sw { width: 9px; height: 9px; border-radius: 2px; }

.flow-set { margin-bottom: 18px; }
.flow-set-head { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.flow-set-name { font-family: var(--mono); font-size: 11px; letter-spacing: .05em; color: var(--tx); padding: 3px 10px; border-radius: 5px; background: var(--bg-elevated); border: 1px solid var(--line-med); }
.flow-set-line { flex: 1; height: 1px; background: var(--line); }
.flow-steps { display: grid; gap: 7px; }
.flow-step {
  display: grid; grid-template-columns: 30px 1fr; gap: 12px; align-items: start;
  padding: 10px 13px; border-radius: var(--r-sm); cursor: pointer;
  background: var(--bg-panel); border: 1px solid var(--line); transition: .14s;
}
.flow-step:hover { border-color: var(--line-strong); background: var(--bg-elevated); }
.flow-step.fail { border-left: 2px solid var(--amber); }
.flow-step.flash { animation: stepflash 1.5s var(--ease); }
@keyframes stepflash {
  0%,100% { border-color: var(--line); background: var(--bg-panel); }
  20% { border-color: var(--cyan); background: var(--cyan-dim); box-shadow: 0 0 0 3px var(--cyan-dim); }
}
.fs-num { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--tx-3); text-align: right; }
.flow-step.fail .fs-num { color: var(--amber); }
.fs-main { min-width: 0; }
.fs-sys { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.fs-tag { font-family: var(--mono); font-size: 9.5px; padding: 1px 6px; border-radius: 3px; }
.fs-fn { font-family: var(--mono); font-size: 12px; color: var(--tx); }
.fs-io { font-size: 11px; line-height: 1.5; color: var(--tx-3); display: grid; grid-template-columns: auto 1fr; gap: 3px 9px; margin-top: 5px; }
.fs-io .io-k { font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--tx-4); }
.fs-io .io-v { font-family: var(--mono); font-size: 11px; color: var(--tx-2); }
.fs-io .io-v.write { color: var(--cyan); }

/* generic grids */
.grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 12px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 12px; }

.kv-card { background: var(--bg-panel); border: 1px solid var(--line); border-radius: var(--r); padding: 14px 16px; }
.kv-card .owner { font-family: var(--mono); font-size: 13px; color: var(--cyan); font-weight: 600; margin-bottom: 7px; }
.kv-card .items { font-size: 11.5px; line-height: 1.6; color: var(--tx-2); }
.kv-card code { font-family: var(--mono); font-size: 11px; color: var(--cyan); }

/* layer stack */
.layer-stack { display: flex; flex-direction: column; align-items: center; gap: 0; }
.layer-box {
  width: 100%; max-width: 560px; background: var(--bg-panel); border: 1px solid var(--line-med);
  border-radius: var(--r); padding: 13px 18px; text-align: center; transition: .15s;
}
.layer-box:hover { border-color: var(--cyan-dim); transform: scale(1.015); }
.layer-name { font-family: var(--mono); font-size: 14px; color: var(--tx); font-weight: 600; }
.layer-role { font-size: 11px; color: var(--tx-3); margin-top: 3px; }
.layer-arrow { color: var(--tx-4); font-size: 13px; padding: 7px 0; }

/* matrix */
.matrix { border-collapse: collapse; font-family: var(--mono); font-size: 12px; }
.matrix th, .matrix td { width: 38px; height: 38px; text-align: center; border: 1px solid var(--line); }
.matrix th { color: var(--tx-3); font-weight: 500; font-size: 11px; }
.matrix th.rowh { text-align: right; padding-right: 10px; width: auto; color: var(--cyan); }
.matrix td.on { color: var(--cyan); background: var(--cyan-dim); }
.matrix td.strong { color: var(--bg-base); background: var(--cyan); font-weight: 700; }
.matrix td.diag { color: var(--tx-4); }

/* coverage */
.cov-grid { display: grid; gap: 3px; }
.cov-cell { aspect-ratio: 1; display: grid; place-items: center; font-family: var(--mono); font-size: 12px; border-radius: 4px; background: var(--bg-elevated); color: var(--tx-4); }
.cov-cell.c1 { background: rgba(79,214,192,0.12); color: var(--tx-3); }
.cov-cell.c2 { background: rgba(79,214,192,0.30); color: var(--tx); }
.cov-cell.c3 { background: rgba(79,214,192,0.62); color: var(--bg-base); font-weight: 700; }
.cov-rowlabel { font-family: var(--mono); font-size: 11px; color: var(--tx-2); display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; }
.cov-colh { font-family: var(--mono); font-size: 10px; color: var(--tx-3); display: grid; place-items: center; padding-bottom: 4px; }

/* tree */
.tree { font-family: var(--mono); font-size: 12px; }
.tree-node { display: flex; align-items: center; gap: 7px; padding: 3px 5px; border-radius: 4px; cursor: pointer; }
.tree-node:hover { background: var(--bg-hover); }
.tree-tog { width: 11px; color: var(--tx-4); font-size: 9px; text-align: center; }
.tree-ico { font-size: 11px; }
.tree-ico.dir { color: var(--cyan); }
.tree-ico.file { color: var(--tx-4); }
.tree-name { color: var(--tx); }
.tree-name.file { color: var(--tx-2); }
.tree-anno { color: var(--tx-4); font-family: var(--ui); font-size: 11px; margin-left: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tree-kids { margin-left: 16px; border-left: 1px solid var(--line); padding-left: 6px; }

/* note cards */
.note-card { background: var(--bg-panel); border: 1px solid var(--line); border-radius: var(--r); padding: 13px 15px; border-top: 2px solid var(--line-med); }
.note-card.ok { border-top-color: var(--sage); }
.note-card.watch { border-top-color: var(--amber); }
.note-head { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.note-tag { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .06em; padding: 2px 7px; border-radius: 3px; background: var(--bg-elevated); color: var(--tx-3); }
.note-tag.ok { color: var(--sage); background: rgba(98,191,149,0.14); }
.note-tag.watch { color: var(--amber); background: var(--amber-dim); }
.note-title { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--tx); }
.note-body { font-size: 11.5px; line-height: 1.6; color: var(--tx-2); }
.note-body code { font-family: var(--mono); font-size: 10.5px; color: var(--cyan); }

/* critical path */
.path-card { background: var(--bg-panel); border: 1px solid var(--line); border-radius: var(--r); padding: 15px 17px; margin-bottom: 12px; }
.path-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 11px; flex-wrap: wrap; }
.path-name { font-size: 13px; font-weight: 600; color: var(--tx); }
.path-len { font-family: var(--mono); font-size: 10.5px; color: var(--tx-4); }
.path-flow { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 11px; }
.path-step { font-family: var(--mono); font-size: 11px; color: var(--tx-2); padding: 4px 9px; border-radius: 5px; background: var(--bg-elevated); border: 1px solid var(--line); }
.path-arrow { color: var(--tx-4); font-size: 11px; }
.path-blast { font-size: 11.5px; line-height: 1.6; color: var(--tx-3); }
.path-blast code { font-family: var(--mono); color: var(--cyan); }

/* concept map */
.concept-root-box { display: inline-block; font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--tx); padding: 9px 20px; border-radius: 22px; background: var(--violet-dim); border: 1px solid var(--violet); }
.concept-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 18px; }
.concept-branch { background: var(--bg-panel); border: 1px solid var(--line); border-radius: var(--r); padding: 16px; }
.concept-head { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--cyan); margin-bottom: 12px; }
.concept-leaves { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 11px; }
.concept-leaf { font-family: var(--mono); font-size: 10.5px; color: var(--tx-2); padding: 4px 9px; border-radius: 5px; background: var(--bg-elevated); border: 1px solid var(--line); }
.concept-trunk { font-size: 11px; color: var(--tx-3); padding: 5px 0; border-top: 1px dashed var(--line); }

/* tick explorer (bespoke) */
.bespoke-banner { font-family: var(--mono); font-size: 10.5px; color: var(--violet); background: var(--violet-dim); border: 1px solid rgba(157,141,247,0.28); border-radius: var(--r-sm); padding: 8px 12px; margin-bottom: 16px; }
.tick-wrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
.tick-flow { display: grid; gap: 6px; align-content: start; }
.tick-step { display: grid; grid-template-columns: 36px 1fr; gap: 11px; padding: 9px 12px; border-radius: var(--r-sm); background: var(--bg-panel); border: 1px solid var(--line); cursor: pointer; transition: .13s; }
.tick-step:hover { border-color: var(--line-strong); }
.tick-step.active { border-color: var(--violet); background: var(--violet-dim); }
.tick-num { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--violet); }
.tick-body { font-size: 11px; line-height: 1.5; color: var(--tx-2); }
.tick-body .sys { font-family: var(--mono); color: var(--cyan); }
.tick-side { display: grid; gap: 11px; align-content: start; }
.tick-panel { background: var(--bg-panel); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 12px 14px; transition: .15s; }
.tick-ptitle { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--tx-3); font-weight: 600; margin-bottom: 9px; }
.tick-prow { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; }
.tick-prow .label { color: var(--tx-3); }
.tick-prow .val { font-family: var(--mono); color: var(--tx); }
.mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 46px; margin-bottom: 8px; }
.mini-bar { flex: 1; background: var(--cyan); opacity: .6; border-radius: 1px 1px 0 0; min-height: 2px; }
.tick-detail { background: var(--bg-elevated); border-left: 3px solid var(--violet); border-radius: 0 5px 5px 0; padding: 9px 12px; font-size: 11px; line-height: 1.5; color: var(--tx-2); }
.tick-detail .tdh { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--violet); font-weight: 700; margin-bottom: 4px; }

/* relationships table */
.rel-table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
.rel-table th { text-align: left; font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--tx-4); font-weight: 600; padding: 7px 10px; border-bottom: 1px solid var(--line-med); }
.rel-table td { padding: 9px 10px; border-bottom: 1px solid var(--line); color: var(--tx-2); line-height: 1.5; vertical-align: top; }
.rel-table .side { font-family: var(--mono); color: var(--cyan); white-space: nowrap; }
.rel-table .breaks { color: var(--tx-3); }
.rel-table tr:hover td { background: var(--bg-hover); }

/* entrance animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.anim-in { animation: fadeUp .4s var(--ease) both; }

@keyframes nodeEnter { from { opacity: 0; } to { opacity: 1; } }
.node-enter { animation: nodeEnter .5s var(--ease) both; }

.pulse-anchor { animation: anchorPulse 1.2s var(--ease); }
@keyframes anchorPulse {
  0% { background: var(--cyan-dim); }
  100% { background: transparent; }
}
#a-flow.pulse-anchor, .doc-head.pulse-anchor { border-radius: var(--r); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001s !important; transition-duration: .001s !important; }
}

/* responsive rail widths — keep the graph from getting crushed */
@media (max-width: 1320px) {
  :root { --left-w: 252px; --right-w: 304px; }
}
@media (max-width: 1120px) {
  :root { --left-w: 224px; --right-w: 272px; }
  .tb-meta { display: none; }
  .tb-search { width: 180px; }
}
@media (max-width: 920px) {
  :root { --left-w: 200px; --right-w: 252px; }
  .tb-search { width: 150px; }
}

/* ============================================================
   SHARED FLOATING TOOLTIP (glossary + graph edges) — never clipped
   ============================================================ */
.float-tip {
  position: fixed; z-index: 9999; pointer-events: none;
  max-width: 260px; background: var(--bg-elevated-2);
  border: 1px solid var(--line-med); border-radius: var(--r);
  padding: 9px 12px; font-family: var(--ui); font-size: 11.5px; line-height: 1.5;
  color: var(--tx-2); box-shadow: 0 16px 40px rgba(0,0,0,.6);
}
.float-tip b { color: var(--tx); font-family: var(--mono); font-size: 12px; display: block; margin-bottom: 4px; }
.float-tip .tip-rel { display: inline-block; font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .06em; padding: 1px 6px; border-radius: 3px; margin-bottom: 5px; }
.float-tip .tip-rel.rel-dep { color: var(--tx-3); background: var(--bg-elevated); }
.float-tip .tip-rel.rel-strong { color: var(--cyan); background: var(--cyan-dim); }
.float-tip .tip-rel.rel-write { color: var(--violet); background: var(--violet-dim); }
.float-tip .tip-rel.rel-peer { color: var(--amber); background: var(--amber-dim); }

.edge-hit { pointer-events: stroke; cursor: help; }

/* glossary term now uses the shared tip (no nested box) */
.gloss-term { cursor: help; }

/* ============================================================
   COVERAGE — redesigned as readable module rows + lens chips
   ============================================================ */
.cov-intro { font-size: 12.5px; line-height: 1.65; color: var(--tx-2); max-width: 760px; margin-bottom: 18px; }
.cov-scale { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin-bottom: 6px; padding: 11px 14px; background: var(--bg-panel); border: 1px solid var(--line); border-radius: var(--r); }
.cov-scale-group { display: flex; align-items: center; gap: 10px; }
.cov-scale-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--tx-4); }
.cov-scale-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--tx-2); }
.cov-swatch { width: 13px; height: 13px; border-radius: 4px; }
.cov-swatch.lv3 { background: rgba(79,214,192,0.85); }
.cov-swatch.lv2 { background: rgba(79,214,192,0.42); }
.cov-swatch.lv1 { background: rgba(79,214,192,0.18); border: 1px solid rgba(79,214,192,0.3); }

.cov-lens-key { display: flex; flex-wrap: wrap; gap: 7px; margin: 14px 0 22px; }
.cov-lens-pill { font-family: var(--mono); font-size: 10.5px; color: var(--tx-3); padding: 4px 9px; border-radius: 20px; background: var(--bg-panel); border: 1px solid var(--line); cursor: help; }
.cov-lens-pill b { color: var(--cyan); font-weight: 500; }

.cov-rows { display: flex; flex-direction: column; gap: 6px; }
.cov-row2 {
  display: flex; flex-wrap: wrap; align-items: center; gap: 9px 16px;
  padding: 11px 16px; background: var(--bg-panel); border: 1px solid var(--line); border-radius: var(--r);
  transition: .14s;
}
.cov-row2:hover { border-color: var(--line-strong); }
.cov-mod { font-family: var(--mono); font-size: 12.5px; color: var(--tx); width: 152px; flex: none; }
.cov-depth { display: flex; align-items: center; gap: 9px; width: 108px; flex: none; }

  "layersNote": "Strictly layered, no cycles: each layer depends only on layers below it. ui reads from every layer below but is read-only on engine state and must never become a source of truth - panes::render never mutates the book or metrics. The whole engine is single-threaded by design (no mutexes, no atomics on the hot path except the telemetry drop counter); the README's lock-free / SPMC-ring ambition is deferred work, and the current single-threaded core is the right foundation for a future single-writer-sharded design.",
  "dataFlow": {
    "intro": "The dominant operation traced end-to-end: an aggressive limit order is generated, matched against one or more resting opposites, recorded, and reflected on the dashboard. In synthetic mode step 1 is the simulator; in --live mode the same SimAction stream arrives from the feed/bridge instead. Every step below is single-threaded on the dashboard's main thread.",
    "simsets": ["Generate", "Submit", "Match", "Record", "Render"],
    "steps": [
      { "n": 1, "sys": "simulator", "fn": "MarketSimulator::step(scaled_dt)", "set": "Generate", "reads": "cfg, ChaCha8 rng, mid_real (dt clamped to min(1/theta,0.25))", "writes": "Vec<SimAction::Submit(Order)>", "fail": true },
      { "n": 2, "sys": "ui", "fn": "App::step", "set": "Submit", "reads": "dt_secs, speed", "writes": "scaled_dt = dt_secs * speed; drains SimAction", "fail": false },
      { "n": 3, "sys": "ui", "fn": "App::handle_submit(order)", "set": "Submit", "reads": "order", "writes": "start = Instant::now()", "fail": false },
      { "n": 4, "sys": "book", "fn": "OrderBook::submit_limit", "set": "Match", "reads": "best bid + ask pre-state (change detection)", "writes": "begins matching loop", "fail": false },
      { "n": 5, "sys": "book", "fn": "matching loop probe", "set": "Match", "reads": "opposite top of book (read-only)", "writes": "break if not crossing", "fail": false },
      { "n": 6, "sys": "book", "fn": "self-match guard", "set": "Match", "reads": "resting.front.id vs aggressor.id", "writes": "SelfMatch -> reject aggressor, break", "fail": true },
      { "n": 7, "sys": "order", "fn": "resting.fill(trade_qty)", "set": "Match", "reads": "remaining (checked_sub)", "writes": "remaining -= trade_qty, status transition", "fail": true },
      { "n": 8, "sys": "book", "fn": "PriceLevel::record_execution", "set": "Match", "reads": "level total_quantity", "writes": "decrement level total", "fail": false },
      { "n": 9, "sys": "order", "fn": "aggressor.fill(trade_qty)", "set": "Match", "reads": "aggressor remaining", "writes": "remaining -= trade_qty", "fail": false },
      { "n": 10, "sys": "events", "fn": "FillEvent::new(buyer, seller, ...)", "set": "Match", "reads": "buyer/seller ids", "writes": "FillEvent (defensive self-match re-check)", "fail": true },
      { "n": 11, "sys": "events", "fn": "OrderEvent::filled", "set": "Match", "reads": "aggressor + resting state", "writes": "lifecycle frames", "fail": false },
      { "n": 12, "sys": "book", "fn": "pop_front / BTreeMap::remove", "set": "Match", "reads": "resting terminal? level empty?", "writes": "evict filled resting + empty level", "fail": false },
      { "n": 13, "sys": "book", "fn": "rest remainder + emit_quote_if_changed", "set": "Match", "reads": "remaining, top-of-book delta", "writes": "OrderEvent::placed + QuoteEvent; reuses resting Ts (never Ts::now())", "fail": true },
      { "n": 14, "sys": "metrics", "fn": "record_latency(Op::Submit/Match)", "set": "Record", "reads": "elapsed = start.elapsed()", "writes": "HDR histogram sample", "fail": false },
      { "n": 15, "sys": "metrics", "fn": "record_orders/fills/rejects", "set": "Record", "reads": "SubmitResult counts", "writes": "windowed counters + tape.push_front", "fail": false },
      { "n": 16, "sys": "telemetry", "fn": "TelemetryHandle::record", "set": "Record", "reads": "TelemetryEvent", "writes": "try_send (drop-on-full) -> JSONL writer thread", "fail": true },
      { "n": 17, "sys": "ui", "fn": "panes::render", "set": "Render", "reads": "book, metrics.snapshot(), tape, mid_history (read-only)", "writes": "frame buffer", "fail": false },
      { "n": 18, "sys": "ui", "fn": "Terminal::draw (33ms tick)", "set": "Render", "reads": "frame buffer", "writes": "terminal", "fail": false }

  "failures": [
    { "step": "6,10", "link": "6 -> 10", "title": "Self-match rejection is match-time and double-defended", "body": "When a resting order and the aggressor share an OrderID, the book rejects the aggressor wholly and leaves the resting counterparty untouched (step 6). FillEvent::new re-checks self-match as defence in depth (step 10), so even a malformed externally-composed engine cannot emit a self-match fill. If either guard is removed, an order could trade against itself - a correctness violation that corrupts position and PnL accounting downstream." },
    { "step": "7", "link": "7 checked_sub", "title": "Over-fill is impossible: checked_sub only", "body": "Qty exposes only checked_sub / checked_add, never saturating_sub. The historical silent over-fill bug came from saturating_sub flooring an underflow at zero; refusing to expose it forces every caller to handle the underflow. Order::fill is two-phase (transition first, write remaining second) so a status-transition failure cannot leave an order half-filled. Break this and fills can exceed resting quantity, manufacturing phantom liquidity." },
    { "step": "13", "link": "1 -> 13", "title": "Determinism: matching never reads the clock", "body": "The matching loop never calls Ts::now(); fills inherit the resting order's timestamp (step 13), and the simulator is seeded ChaCha8 (step 1). The same input sequence therefore produces byte-identical events, pinned by tests/matching_test.rs::run_twice_identical_sequence_identical_output. This is what lets a trading day be replayed for debugging. Any Ts::now() call inside matching silently breaks replay determinism." },
    { "step": "16", "link": "16 try_send", "title": "Telemetry can never freeze the engine", "body": "The flight recorder uses a bounded sync_channel(8192) with try_send and an AtomicU64 drop counter (step 16). Under back-pressure it drops events and records the drop count rather than blocking the main thread on disk I/O. If this became a blocking send, a slow disk would stall the entire single-threaded engine + render loop." },
    { "step": "1", "link": "1 dt-cap", "title": "Simulator mid cannot diverge (OU stability)", "body": "The OU mid is integrated by explicit Euler, stable only while theta*dt < 2. step() clamps dt to min(1/theta, 0.25) and guards mid_real finite (step 1); without the cap a frame hitch at elevated speed diverged the mid to a near-u64::MAX value whose inter-sample delta overflowed ratatui's sparkline multiply and crashed the app (fixed in ceed2e9, regression-tested)." }

    { "term": "LOB", "def": "Limit Order Book - the two sorted lists (bids, asks) of resting orders the engine maintains and matches against." },

    { "term": "OFI", "def": "Order-Flow Imbalance - the relative weight of bid-side vs ask-side depth, used as a directional pressure signal." },

  const SVGNS = "http://www.w3.org/2000/svg";

  let nodes = [], edges = [], byId = {};
  let collapsed = new Set();

  let selected = null, hovered = null, selEdge = null;

  function el(tag, a) { const e = document.createElementNS(SVGNS, tag); if (a) for (const k in a) e.setAttribute(k, a[k]); return e; }
  function relName(rel) { return { dep: "dependency", strong: "load-bearing", write: "write-back", peer: "hidden coupling" }[rel] || rel; }

  /* ---------- visible set (collapse groups) ---------- */
  function computeVisible() {
    const hidden = new Set();
    allNodes.forEach(n => { if (n.group && collapsed.has(n.group)) hidden.add(n.id); });
    nodes = allNodes.filter(n => !hidden.has(n.id));
    byId = {}; nodes.forEach(n => byId[n.id] = n);
    const map = id => (hidden.has(id) ? allById[id].group : id);
    const seen = new Set(); edges = [];
    allEdges.forEach(e => {
      const a = map(e.from), b = map(e.to);
      if (a === b) return;
      const key = a + ">" + b;
      if (seen.has(key)) { // keep strongest rel on merge
        const ex = edges.find(x => x.from === a && x.to === b);
        if (ex && rank(e.rel) > rank(ex.rel)) { ex.rel = e.rel; ex.label = e.label; }

      edges.push({ from: a, to: b, rel: e.rel, label: e.label });

  /* ---------- highlight / paint ---------- */

  /* ---------- drag / pan / zoom ---------- */

  function loadPositions() { try { posOverride = JSON.parse(localStorage.getItem(POS_KEY)) || {}; } catch (e) { posOverride = {}; } }
  function resetPositions() { posOverride = {}; savePositions(); setMode(mode); }

  function initPanZoom() {
    let panning = false, sx, sy, vx, vy;
    stage.addEventListener("mousedown", e => {
      if (e.target.closest(".node") || e.target.closest(".edge-hit")) return;
      panning = true; stage.classList.add("panning"); sx = e.clientX; sy = e.clientY; vx = view.x; vy = view.y;

  function bbox() {

  /* ---------- minimap ---------- */

    nodes.forEach(n => { const c = el("rect", { rx: 8, fill: `var(--k-${n.kind})`, opacity: .85 }); n._mm = c; mm.append(c); });

  /* ---------- tick-flow animation ---------- */
  function flowNodes(ids, o) {
    o = o || {}; stopFlow();
    const seq = ids.filter(id => byId[id]);
    if (!seq.length) return;
    let i = 0;
    function step() {
      nodes.forEach(n => n._g.classList.remove("flow-on"));
      edges.forEach(e => e._f.classList.remove("run", "flow-edge"));
      const id = seq[i], n = byId[id];
      if (n) n._g.classList.add("flow-on");
      if (i > 0) { const e = edges.find(e => e.from === seq[i - 1] && e.to === id) || edges.find(e => e.from === id && e.to === seq[i - 1]); if (e) { e._f.classList.add("run", "flow-edge"); } }
      if (opts.onFlowStep) opts.onFlowStep(i, id);
      i++;
      if (i < seq.length) flowTimer = setTimeout(step, o.interval || 620);
      else if (o.loop) { i = 0; flowTimer = setTimeout(step, 950); }

    }

  }

    edges.forEach(e => e._f && e._f.classList.remove("run", "flow-edge"));
    if (!hovered && !selected && !selEdge) clearPaint();
  }
  function isFlowing() { return !!flowTimer; }

  /* ---------- external highlight (entity linking) ---------- */

    nodes.forEach(n => n._g.classList.toggle("ext-hot", set.has(n.id)));
    nodes.forEach(n => n._g.classList.toggle("dim", set.size > 0 && !set.has(n.id)));
  }
  function clearHighlight() {
    nodes.forEach(n => n._g.classList.remove("ext-hot"));
    paint();
  }

  /* ---------- ego mini-graph (dossier) ---------- */
  function renderEgo(svgEl, id) {
    const center = allById[id]; if (!center) return;
    const outs = allEdges.filter(e => e.from === id).map(e => ({ id: e.to, dir: "out", rel: e.rel }));
    const ins = allEdges.filter(e => e.to === id).map(e => ({ id: e.from, dir: "in", rel: e.rel }));
    const all = [...ins, ...outs];
    const W = 300, H = 150, cx = W / 2, cy = H / 2;
    svgEl.setAttribute("viewBox", `0 0 ${W} ${H}`);
    let s = "";
    const place = [];
    const n = all.length || 1;
    all.forEach((nb, i) => {
      const ang = (i / n) * Math.PI * 2 - Math.PI / 2;
      const r = 56;
      place.push({ ...nb, x: cx + Math.cos(ang) * r * 1.7, y: cy + Math.sin(ang) * r });
    });
    place.forEach(p => {
      const col = { dep: "rgba(255,255,255,0.25)", strong: "#4fd6c0", write: "#9d8df7", peer: "#f0b65e" }[p.rel];
      const x1 = p.dir === "out" ? cx : p.x, y1 = p.dir === "out" ? cy : p.y;
      const x2 = p.dir === "out" ? p.x : cx, y2 = p.dir === "out" ? p.y : cy;
      s += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="1.3" ${p.rel === "write" || p.rel === "peer" ? 'stroke-dasharray="3 3"' : ""}/>`;
    });
    place.forEach(p => {
      const k = allById[p.id].kind;
      s += `<g class="ego-node" data-ego="${p.id}" style="cursor:pointer"><circle cx="${p.x}" cy="${p.y}" r="5" fill="var(--k-${k})"/>` +
        `<text x="${p.x}" y="${p.y + 15}" text-anchor="middle" font-size="8.5" fill="#a6adbf" font-family="var(--mono)">${p.id}</text></g>`;
    });
    s += `<g><rect x="${cx - 30}" y="${cy - 13}" width="60" height="26" rx="7" fill="#11131b" stroke="var(--k-${center.kind})" stroke-width="1.4"/>` +
      `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#e7eaf2" font-family="var(--mono)">${center.label}</text></g>`;
    svgEl.innerHTML = s;
    svgEl.querySelectorAll(".ego-node").forEach(g => g.addEventListener("click", () => selectExternal(g.dataset.ego)));
  }

  /* ---------- rebuild ---------- */
  function rebuild(relayout) {
    computeVisible();
    gEdges.replaceChildren(); gFlow.replaceChildren(); gNodes.replaceChildren();
    buildEdges(); buildNodes(); buildMinimap();
    doLayout();
    renderPositions();
    if (relayout !== false) fit(true);
    paint(); syncExplorer();
  }
  function doLayout() { if (mode === "force") forceLayout(); else if (mode === "radial") radialLayout(); else layeredLayout(); }

  function setMode(m) {
    mode = m;
    document.querySelectorAll("[data-graph-mode]").forEach(b => b.classList.toggle("active", b.dataset.graphMode === m));
    if (m === "force") forceLayout();
    else { doLayout(); renderPositions(); fit(true); }
  }
  function setImpact(on) {
    impactMode = on;
    document.querySelectorAll("[data-impact-toggle]").forEach(b => b.classList.toggle("active", on));
    paint();
    if (!on && opts.onImpact) opts.onImpact(null);
    else if (on && selected && opts.onImpact) paintImpact(selected);
  }

  function init(stageEl, o) {
    stage = stageEl; opts = o || {};
    allNodes = ARCH.nodes.map(n => ({ ...n }));
    allEdges = ARCH.edges.map(e => ({ ...e }));
    allById = {}; allNodes.forEach(n => allById[n.id] = n);
    const deg = {}; allNodes.forEach(n => deg[n.id] = 0);
    allEdges.forEach(e => { deg[e.from]++; deg[e.to]++; });
    allNodes.forEach(n => { n._deg = deg[n.id]; const d = Math.min(deg[n.id], 8); n.w = Math.max(106 + d * 5, 36 + n.label.length * 8.4); n.h = 44 + d * 1.7; });
    loadPositions();

    svg = el("svg");
    const defs = el("defs");
    [["dep", "rgba(255,255,255,0.3)"], ["strong", "#4fd6c0"], ["write", "#9d8df7"], ["peer", "#f0b65e"]].forEach(([k, c]) => {
      const m = el("marker", { id: "ar-" + k, viewBox: "0 0 10 10", refX: 9, refY: 5, markerWidth: 6, markerHeight: 6, orient: "auto-start-reverse" });
      m.append(el("path", { d: "M0 0 L10 5 L0 10 z", fill: c })); defs.append(m);
    });
    svg.append(defs);
    root = el("g", { id: "graphRoot" });
    gEdges = el("g"); gFlow = el("g"); gNodes = el("g"); root.append(gEdges, gFlow, gNodes);
    svg.append(root); stage.append(svg);

    computeVisible(); buildEdges(); buildNodes(); buildMinimap();
    layeredLayout(); renderPositions(); initPanZoom();
    requestAnimationFrame(() => fit(false));

    let rt = null, lastW = 0, lastH = 0;
    new ResizeObserver(() => {
      const r = stage.getBoundingClientRect();
      if (r.width < 2 || r.height < 2) return;
      if (Math.abs(r.width - lastW) < 2 && Math.abs(r.height - lastH) < 2) return;
      lastW = r.width; lastH = r.height; clearTimeout(rt); rt = setTimeout(() => fit(true), 90);
    }).observe(stage);

    return {
      setMode, fit: () => fit(true), zoomIn: () => zoomBy(1.2), zoomOut: () => zoomBy(1 / 1.2),
      select: selectExternal, deselect, arrange: () => { resetPositions(); }, getSelected: () => selected,
      toggleGroup, setImpact, isImpact: () => impactMode,
      flowNodes, stopFlow, isFlowing,
      highlight, clearHighlight, renderEgo, resetPositions,
      selectEdge: (f, t) => { const e = edges.find(x => x.from === f && x.to === t) || edges.find(x => x.from === t && x.to === f); if (e) selectEdge(e); },
      hasNode: (id) => !!byId[id],
    };
  }

  return { init };
})();

<script>
/* ============================================================
   features.js — cross-cutting systems
   global search/command palette · entity linking · markdown
   source · state persistence · keyboard nav
   ============================================================ */
(function () {
  const A = window.ARCH;
  window.App = window.App || {};
  const App = window.App;
  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));
  const esc = s => window.App.esc(s);

  /* ================= GLOBAL SEARCH / COMMAND PALETTE ================= */
  function buildIndex() {
    const idx = [];
    A.nodes.forEach(n => idx.push({ kind: "subsystem", label: n.label, sub: n.tagline, icon: "◉", color: `var(--k-${n.kind})`, run: () => App.selectNode(n.id) }));
    const secs = [
      ["Scope / Purpose", "source", "scope"], ["Repository Overview", "source", "overview"], ["Milestones", "source", "milestones"], ["Repository Tree", "source", "tree"],
      ["Data Flow", "flow", "flow"], ["Failure Semantics", "flow", "failures"], ["Critical Paths", "paths", "paths"],
      ...((A.bespoke || []).map(b => [b.title, "paths", "bespoke-" + b.id])),
      ["Dependency Layers", "deps", "layers"], ["Inter-System Relations", "deps", "relations"], ["Adjacency Matrix", "deps", "matrix"],
      ["State Ownership", "deps", "state"], ["Coverage", "cov", "cov"], ["Concept Map", "concept", "concept"], ["Structural Notes", "concept", "notes"],
    ];
    secs.forEach(([l, t, a]) => idx.push({ kind: "section", label: l, sub: "section · " + t, icon: "▸", color: "var(--tx-3)", run: () => App.openAnchor(t, a) }));
    A.glossary.forEach(g => idx.push({ kind: "term", label: g.term, sub: g.def, icon: "✦", color: "var(--cyan)", run: () => App.openAnchor("concept", "concept") }));
    A.risks.forEach(r => idx.push({ kind: "risk", label: r.title, sub: "risk · " + r.node, icon: "▲", color: "var(--red)", run: () => App.selectNode(r.node) }));
    A.decisions.forEach(d => idx.push({ kind: "decision", label: d.title, sub: "decision", icon: "◆", color: "var(--cyan)", run: () => App.selectNode(d.node) }));
    A.dataFlow.steps.forEach(s => idx.push({ kind: "step", label: `${String(s.n).padStart(2, "0")} ${s.fn}`, sub: "data-flow step · " + s.sys, icon: "↯", color: "var(--tx-3)", run: () => { App.openAnchor("flow", "flow"); setTimeout(() => App.flashStep(s.n), 350); } }));
    // commands
    idx.push({ kind: "cmd", label: "Play data flow on graph", sub: "command", icon: "▶", color: "var(--cyan)", run: () => { App.switchTab("graph"); App.graph().flowNodes(A.dataFlow.steps.map(s => s.sys.split("::")[0]).filter((x, i, a) => x !== a[i - 1]), { interval: 560 }); } });
    idx.push({ kind: "cmd", label: "Toggle blast-radius mode", sub: "command", icon: "⊛", color: "var(--cyan)", run: () => { App.switchTab("graph"); App.graph().setImpact(!App.graph().isImpact()); } });
    idx.push({ kind: "cmd", label: "View raw markdown source", sub: "command", icon: "⟨⟩", color: "var(--cyan)", run: () => { if (App.setMd) App.setMd(true); } });
    return idx;
  }
  const INDEX = buildIndex();

  function initSearch() {
    const inp = $("#search"), box = $("#searchResults");
    let active = -1, results = [];
    function render(q) {
      q = q.trim().toLowerCase();
      if (!q) { results = INDEX.slice(0, 8); }
      else results = INDEX.map(it => ({ it, s: score(it, q) })).filter(x => x.s > 0).sort((a, b) => b.s - a.s).slice(0, 9).map(x => x.it);
      active = results.length ? 0 : -1;
      box.innerHTML = results.length ? results.map((r, i) => `
        <div class="sr-item ${i === active ? "active" : ""}" data-i="${i}">
          <span class="sr-icon" style="color:${r.color}">${r.icon}</span>
          <span class="sr-main"><span class="sr-label">${esc(r.label)}</span><span class="sr-sub">${esc(r.sub.slice(0, 70))}</span></span>
          <span class="sr-kind">${esc(r.kind)}</span>
        </div>`).join("") : `<div class="sr-empty">No matches for “${esc(q)}”</div>`;
      box.classList.add("open");
      box.querySelectorAll(".sr-item").forEach(el => {
        el.addEventListener("mousedown", e => { e.preventDefault(); choose(+el.dataset.i); });
        el.addEventListener("mouseenter", () => { active = +el.dataset.i; hl(); });
      });
    }
    function score(it, q) {
      const l = it.label.toLowerCase(), s = (it.sub || "").toLowerCase();
      if (l === q) return 100;
      if (l.startsWith(q)) return 60;
      if (l.includes(q)) return 40;
      if (s.includes(q)) return 15;
      return 0;
    }
    function hl() { box.querySelectorAll(".sr-item").forEach((el, i) => el.classList.toggle("active", i === active)); }
    function choose(i) { const r = results[i]; if (r) { r.run(); close(); inp.blur(); } }
    function close() { box.classList.remove("open"); box.innerHTML = ""; }
    inp.addEventListener("input", () => render(inp.value));
    inp.addEventListener("focus", () => render(inp.value));
    inp.addEventListener("blur", () => setTimeout(close, 120));
    inp.addEventListener("keydown", e => {
      if (e.key === "ArrowDown") { e.preventDefault(); active = Math.min(results.length - 1, active + 1); hl(); }
      else if (e.key === "ArrowUp") { e.preventDefault(); active = Math.max(0, active - 1); hl(); }
      else if (e.key === "Enter") { e.preventDefault(); choose(active); }
      else if (e.key === "Escape") { close(); inp.blur(); }
    });
    document.addEventListener("keydown", e => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") { e.preventDefault(); inp.focus(); inp.select(); render(inp.value); }
      else if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "b") { e.preventDefault(); $("#toggleLeft").click(); }
    });
  }

  /* ================= UNIVERSAL ENTITY LINKING ================= */
  function initEntity() {
    function lit(name, on) {
      $$(`.ent[data-entity="${cssEsc(name)}"]`).forEach(el => el.classList.toggle("entity-lit", on));
      const owner = App.ENTITY[name];
      const g = App.graph && App.graph();
      if (on && owner && g && g.hasNode(owner)) g.highlight([owner]);
      else if (!on && g) g.clearHighlight();
    }
    function cssEsc(s) { return String(s).replace(/"/g, '\\"'); }
    document.addEventListener("mouseover", e => { const t = e.target.closest(".ent[data-entity]"); if (t) lit(t.dataset.entity, true); });
    document.addEventListener("mouseout", e => { const t = e.target.closest(".ent[data-entity]"); if (t) lit(t.dataset.entity, false); });
  }

  /* ================= MARKDOWN SOURCE ================= */
  function mdTable(headers, rows) {
    return `| ${headers.join(" | ")} |\n| ${headers.map(() => "---").join(" | ")} |\n` +
      rows.map(r => `| ${r.map(c => String(c).replace(/\|/g, "\\|").replace(/\n/g, " ")).join(" | ")} |`).join("\n");
  }
  const MD = {
    graph() {
      let s = `## Subsystem Map\n\n`;
      A.nodes.forEach(n => { s += `### ${n.label}  \`${n.root}\`\n${n.tagline}\n\n- **Owns:** ${n.owns}\n`; const o = A.edges.filter(e => e.from === n.id).map(e => `${e.to} (${e.rel})`); const i = A.edges.filter(e => e.to === n.id).map(e => `${e.from} (${e.rel})`); if (o.length) s += `- **Depends on / writes:** ${o.join(", ")}\n`; if (i.length) s += `- **Consumed by:** ${i.join(", ")}\n`; s += `\n`; });
      return s;
    },
    flow() {
      let s = `## Core Execution / Data Flow\n\n${A.dataFlow.intro}\n\nSimSet order: ${A.dataFlow.simsets.join(" → ")}\n\n`;
      A.dataFlow.steps.forEach(st => { s += `${String(st.n).padStart(2, "0")}. **${st.sys}::${st.fn}** \`${st.set}\`${st.fail ? " ⚠" : ""}\n    - reads: ${st.reads}\n    - writes: ${st.writes}\n`; });
      s += `\n### Failure Semantics\n\n`; A.failures.forEach(f => s += `- **${f.link} · ${f.title}** — ${f.body}\n`);
      return s;
    },
    deps() {
      let s = `## Dependency Direction\n\n`;
      A.layers.forEach((l, i) => s += `${i + 1}. **${l.name}** — ${l.role}\n`);
      s += `\n> ${A.layersNote}\n\n## Inter-System Relationships\n\n` + mdTable(["A", "B", "Mechanism", "Data", "Breaks if violated"], A.relationships.map(r => [r.a, r.b, r.mech, r.data, r.breaks]));
      s += `\n\n## State Ownership\n\n`; A.stateOwnership.forEach(o => s += `- **${o.owner}** — ${o.items}\n`);
      return s;
    },
    cov() {
      let s = `## Coverage\n\n${A.coverage.note}\n\n`;
      s += mdTable(["Module", ...A.coverage.cols], A.coverage.rows.map(r => [r.label, ...A.coverage.cols.map(c => r.cells[c] || "·")]));
      return s;
    },
    paths() {
      let s = `## Critical Paths & Blast Radius\n\n`;
      A.criticalPaths.forEach(p => s += `### ${p.name} (${p.len})\n${p.steps.join(" → ")}\n\n${p.blast}\n\n`);
      (A.bespoke || []).forEach(b => { s += `### ${b.title}\n${b.subtitle || ""}\n\n`; (b.steps || []).forEach(st => s += `- **${st.id}${st.sys ? " " + st.sys : ""}** - ${st.body}\n`); s += `\n`; });
      return s;
    },
    concept() {
      let s = `## Concept Map — ${A.concept.root}\n\n`;
      A.concept.branches.forEach(b => { s += `### ${b.head}\n` + b.leaves.map(l => `- ${l}`).join("\n") + "\n" + b.trunks.map(t => `- ${t}`).join("\n") + "\n\n"; });
      s += `> ${A.concept.note}\n\n## Structural Notes\n\n`; A.notes.forEach(n => s += `- **[${n.tag}] ${n.title}** — ${n.body}\n`);
      return s;
    },
    source() {
      const p = A.project;
      let s = `# ${p.name}\n\n${p.tagline}\n\n> ${p.purpose}\n\n## Tech stack\n` + p.techStack.map(t => `- ${t.name} (${t.meta})`).join("\n");
      s += `\n\n## Roadmap\n` + A.milestones.map(m => `- **${m.id} ${m.title}** [${m.status}] — ${m.note}`).join("\n");
      s += `\n\n## Repository\n` + treeMd(A.repoTree, 0);
      return s;
    },
  };
  function treeMd(n, d) { let s = `${"  ".repeat(d)}- ${n.name}${n.anno ? ` — ${n.anno}` : ""}\n`; (n.children || []).forEach(c => s += treeMd(c, d + 1)); return s; }
  App.markdownFor = tab => `<!-- generated from arch/data.js (view: ${tab}) -->\n\n` + ((MD[tab] && MD[tab]()) || "");

  /* ================= PERSISTENCE ================= */
  const KEY = "nd.state.v3";
  let restoring = false;
  function persist() {
    if (restoring) return;
    const wb = $("#workbench");
    const app = document.querySelector(".app");
    const st = {
      tab: App.curTab(), node: App.graph() ? App.graph().getSelected() : null,
      left: wb.classList.contains("left-collapsed"), right: wb.classList.contains("right-collapsed"),
      bottom: app.classList.contains("bottom-collapsed"),
    };
    try { localStorage.setItem(KEY, JSON.stringify(st)); } catch (e) {}
    const h = "#" + st.tab + (st.node ? "/" + st.node : "");
    if (location.hash !== h) history.replaceState(null, "", h);
  }
  App.persist = persist;
  function restore() {
    restoring = true;
    let st = {};
    try { st = JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) {}
    const hash = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (hash) { const [t, n] = hash.split("/"); if (t) st.tab = t; if (n) st.node = n; else if (hash.indexOf("/") < 0) st.node = null; }
    if (st.left) App.setLeft(true);
    if (st.right) App.setRight(true);
    if (st.bottom) App.setBottom(true);
    if (st.node && App.graph().hasNode(st.node)) App.graph().select(st.node);
    if (st.tab && App.tabs.some(t => t.id === st.tab)) App.switchTab(st.tab);
    restoring = false;
    persist();
  }

  /* ================= KEYBOARD NAV ================= */
  function initKeys() {
    document.addEventListener("keydown", e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.key === "Escape") { App.graph().stopFlow(); App.graph().deselect(); $("#searchResults").classList.remove("open"); }
      else if (/^[1-7]$/.test(e.key)) { const t = App.tabs[+e.key - 1]; if (t) App.switchTab(t.id); }
    });
  }

  App.initFeatures = function () {
    initSearch(); initEntity(); initKeys();
    requestAnimationFrame(() => requestAnimationFrame(restore));
  };
})();

<script>
/* ============================================================
   App shell — explorer, tabs, content panes, right rail
   v3 — interactive everywhere
   ============================================================ */
(function () {
  const A = window.ARCH;
  const $ = (s, r = document) => r.querySelector(s);
  const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
  const esc = s => String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  const escAttr = s => esc(s).replace(/"/g, "&quot;");
  let graph = null;

  /* ---- derived indexes ---- */
  const nodeById = {}; A.nodes.forEach(n => nodeById[n.id] = n);
  const riskByNode = {}; A.risks.forEach(r => (riskByNode[r.node] = riskByNode[r.node] || []).push(r));
  const hotspotByNode = {}; A.changeFrontier.forEach(c => { hotspotByNode[c.node] = Math.max(hotspotByNode[c.node] || 0, Math.max(...c.bars)); });
  // entity -> owner node (for universal hover linking).
  // The tracked-entity set is derived at runtime from A.nodes[].state and
  // A.stateOwnership[]. No hardcoded project-specific identifiers.
  const ENTITY = {};
  const TRACKED = [];
  function normNode(name) {
    if (!name) return null;
    const lc = String(name).toLowerCase();
    for (const n of A.nodes) {
      if (lc === n.id || lc === (n.label || "").toLowerCase()) return n.id;
    }
    for (const n of A.nodes) {
      if (lc.includes(n.id) || (n.label && lc.includes(n.label.toLowerCase()))) return n.id;
    }
    return null;
  }
  (A.stateOwnership || []).forEach(s => {
    const owner = normNode(s.owner);
    if (owner && s.items) {
      String(s.items).split(/[,;]\s*/).forEach(raw => {
        const key = raw.trim().split(" (")[0].split(".")[0];
        if (key && /^[A-Z][\w]*$/.test(key) && !ENTITY[key]) {
          ENTITY[key] = owner;
          TRACKED.push(key);
        }
      });
    }
  });
  (A.nodes || []).forEach(n => (n.state || []).forEach(st => {
    const key = String(st).split(" (")[0].split(".")[0];
    if (key && !ENTITY[key]) {
      ENTITY[key] = n.id;
      TRACKED.push(key);
    }
  }));
  window.App = window.App || {};
  window.App.ENTITY = ENTITY;
  function linkifyStates(str) {
    let out = esc(str);
    TRACKED.forEach(t => {
      const re = new RegExp("\\b" + t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\b", "g");
      out = out.replace(re, `<span class="ent" data-entity="${t}">${t}</span>`);
    });
    return out;
  }
  function downstreamNodes(id) {
    const seen = new Set([id]); let fr = [id];
    while (fr.length) { const nx = []; fr.forEach(u => A.edges.forEach(e => { if (e.from === u && e.rel !== "peer" && !seen.has(e.to)) { seen.add(e.to); nx.push(e.to); } })); fr = nx; }
    seen.delete(id); return [...seen];
  }
  function daysSince(d) { return Math.round((Date.now() - new Date(d).getTime()) / 86400000); }

  /* path step label -> node id (for tracing on graph).
     Derived at runtime from A.dataFlow.steps[].sys mapping plus the optional
     A.dataFlow.pathMap override for projects that want custom routing. */
  const PATHMAP = (function () {
    const m = {};
    (A.dataFlow && A.dataFlow.steps || []).forEach(s => {
      const sys = String(s.sys || "").split("::")[0];
      if (sys && nodeById[sys]) m[sys] = sys;
    });
    Object.assign(m, (A.dataFlow && A.dataFlow.pathMap) || {});
    return m;
  })();
  function pathNodeSeq(steps) {
    const ids = (steps || []).map(s => PATHMAP[s] || (nodeById[s] ? s : null)).filter(Boolean);
    return ids.filter((id, i) => id !== ids[i - 1]); // collapse repeats
  }

  /* ---------------- tab registry ---------------- */
  const TABS = [
    { id: "graph", label: "Graph", ti: "◉", badge: A.nodes.length + " nodes" },
    { id: "flow", label: "Data Flow", ti: "↯", badge: ((A.dataFlow && A.dataFlow.steps) || []).length },
    { id: "deps", label: "Dependencies", ti: "⇄", badge: A.relationships.length },
    { id: "cov", label: "Coverage", ti: "▦" },
    { id: "paths", label: "Paths", ti: "⌥", badge: A.criticalPaths.length },
    { id: "concept", label: "Concept", ti: "✦" },
    { id: "source", label: "Source", ti: "#" },
  ];

  /* ---------------- top bar ---------------- */
  function renderTopbar() {
    const stale = daysSince(A.project.regenerated);
    const freshClass = stale > 30 ? "stale" : "fresh";
    $("#topbar").innerHTML = `
      <button class="tb-panel-toggle on" id="toggleLeft" title="Toggle explorer (⌘B)">☰</button>
      <div class="tb-brand"><div class="tb-logo"></div></div>
      <div class="tb-crumb">
        <span class="dim">context</span><span class="sep">/</span>
        <span class="proj">${esc(A.project.name)}</span><span class="sep">/</span>
        <span class="file">${esc(A.project.file ? A.project.file.split("/").pop() : "architecture.html")}</span>
      </div>

  /* ---------------- left explorer ---------------- */

        { lbl: "Repository Tree", ico: "▸", tab: "source", anchor: "tree" },

        { lbl: "Adjacency Matrix", ico: "▦", tab: "deps", anchor: "matrix" },
        { lbl: "State Ownership", ico: "◫", tab: "deps", anchor: "state" },
        { lbl: "Coverage", ico: "▦", tab: "cov", anchor: "cov" },
        { lbl: "Concept Map", ico: "✦", tab: "concept", anchor: "concept" },
        { lbl: "Structural Notes", ico: "✎", tab: "concept", anchor: "notes" },
      ]},
    ];
    const html = `<div class="lr-filter" id="lrFilter">${kinds.map((k, i) => `<button class="lr-chip ${i === 0 ? "active" : ""}" data-kind="${k[0]}">${esc(k[1])}</button>`).join("")}</div>` +
      groups.map(g => `
      <div class="lr-group" data-group="${esc(g.name)}">
        <div class="lr-group-head">
          <span class="chev">▾</span>${esc(g.name)}
          ${g.count != null ? `<span class="gcount">${g.count}</span>` : ""}
        </div>
        <div class="lr-group-items">
          ${g.items.map(it => it.isNode ? `
            <div class="lr-item node-item" data-node="${it.node}" data-kind="${it.kind}" data-search="${esc(it.lbl)} ${esc(it.kind)}" data-tip="${escAttr(nodeById[it.node].tagline)}">
              <span class="swatch" style="background:var(--k-${it.kind})"></span>
              <span class="lbl">${esc(it.lbl)}</span>
              <span class="lr-flags">${it.hot ? '<span class="flag-hot" title="recent change hotspot">●</span>' : ""}${it.risk ? `<span class="flag-risk" title="${it.risk} risk(s)">▲</span>` : ""}</span>
              <span class="meta">${esc(it.meta)}</span>
            </div>` : `
            <div class="lr-item" data-tab="${it.tab}" data-anchor="${it.anchor || ""}" data-search="${esc(it.lbl)}">
              <span class="ico">${it.ico}</span><span class="lbl">${esc(it.lbl)}</span>
            </div>`).join("")}

      </div>`).join("");

    }));

      if (it.dataset.node) { switchTab("graph"); graph.select(it.dataset.node); }
      else openAnchor(it.dataset.tab, it.dataset.anchor);
    }));
    $$("#lrFilter .lr-chip").forEach(ch => ch.addEventListener("click", () => {
      $$("#lrFilter .lr-chip").forEach(c => c.classList.toggle("active", c === ch));
      const k = ch.dataset.kind;
